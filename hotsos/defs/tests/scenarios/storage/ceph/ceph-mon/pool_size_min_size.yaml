target-name: pool_size_min_size.yaml
data-root:
  copy-from-original:
    - sos_commands/systemd/systemctl_list-units
    - sos_commands/systemd/systemctl_list-unit-files
mock:
  patch:
    hotsos.core.plugins.storage.ceph.CephCrushMap.ceph_report:
      kwargs:
        new:
          osdmap:
            pools:
              - pool: 1
                pool_name: safe
                type: 1
                size: 3
                min_size: 2
              - pool: 2
                pool_name: small_but_valid
                type: 1
                size: 2
                min_size: 1
              - pool: 3
                pool_name: size_eq_min_size
                type: 1
                size: 3
                min_size: 3
              - pool: 4
                pool_name: min_size_gt_size
                type: 1
                size: 2
                min_size: 3
              - pool: 5
                pool_name: ec_safe
                type: 3
                size: 4
                min_size: 3
              - pool: 6
                pool_name: ec_size_eq_min_size
                type: 3
                size: 2
                min_size: 2
              - pool: 7
                pool_name: ec_min_size_gt_size
                type: 3
                size: 2
                min_size: 3
raised-issues:
  CephMonWarning: >-
    Found Ceph pool(s) ec_min_size_gt_size (size=2, min_size=3),
    ec_size_eq_min_size (size=2, min_size=2),
    min_size_gt_size (size=2, min_size=3),
    size_eq_min_size (size=3, min_size=3) where size is not greater than
    min_size. Ceph pools should satisfy size > min_size so they can keep
    servicing I/O in degraded states. Please set min_size lower than size
    for the affected pool(s).
